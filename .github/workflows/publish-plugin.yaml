name: Publish Plugin to Maven Central

on:
  push:
    tags:
      - '*'

jobs:
  gradle:
    runs-on: ubuntu-latest
    env:
      # Override to publish the plugin under your own namespace. PUBLISH_GROUP sets the
      # Maven group of the main plugin artifact; PUBLISH_PLUGIN_ID sets the plugin id,
      # which is also the groupId of the generated plugin-marker artifact. Both default
      # to the canonical values. Set them as repository variables to publish under your
      # own verified namespace.
      ORG_GRADLE_PROJECT_GROUP: ${{ vars.PUBLISH_GROUP || 'com.seanproctor' }}
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle Caches
        uses: gradle/actions/setup-gradle@v6

      - name: Build & check plugin
        run: ./gradlew :plugin:check :plugin:validatePlugins --continue

      - name: Publish plugin to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache
        if: success()
        env:
          # ORG_GRADLE_PROJECT_ID is the plugin id (= groupId of the marker artifact);
          # it must stay under the verified namespace set by PUBLISH_PLUGIN_ID.
          ORG_GRADLE_PROJECT_ID: ${{ vars.PUBLISH_PLUGIN_ID || 'com.seanproctor.potassium' }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVENCENTRALUSERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVENCENTRALPASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNINGINMEMORYKEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNINGKEYID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNINGPASSWORD }}
